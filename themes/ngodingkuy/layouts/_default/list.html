{{ define "main" }}
    <h1>{{ .Title }}</h1>

    {{ if .Content }}
        <div class="section-content">
            {{ .Content }}
        </div>
    {{ end }}

    <div class="posts-list">
        {{ range .Pages.ByDate.Reverse }}
            <article class="post-preview">
                <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
                <p>{{ .Summary }}</p>
            </article>
        {{ end }}
    </div>
{{ end }}
